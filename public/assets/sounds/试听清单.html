<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>福宠猫狗真实声音试听清单</title>
  <style>
    :root{font-family:system-ui,"Microsoft YaHei",sans-serif;color:#392f28;background:#f6f1eb}*{box-sizing:border-box}body{max-width:980px;margin:auto;padding:32px 18px 60px}header{padding:24px;border-radius:24px;background:linear-gradient(135deg,#fff,#f2e2d3);box-shadow:0 16px 45px #5d402018}h1{margin:0 0 8px;font-size:25px}header p{margin:0;color:#806f62;font-size:13px;line-height:1.7}.tabs{display:flex;gap:8px;margin:22px 0 14px}.tabs button{border:1px solid #dbc7b6;border-radius:999px;padding:9px 16px;background:#fff;color:#73553e}.tabs button.on{background:#8b5d3a;color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(245px,1fr));gap:10px}.item{padding:12px;border:1px solid #eadfd4;border-radius:17px;background:#fff;box-shadow:0 7px 20px #60411f0b}.item b,.item small{display:block}.item small{margin:4px 0 9px;color:#9a8879}.item audio{width:100%;height:34px}.item a{display:block;margin-top:8px;color:#9a603b;font-size:12px;text-decoration:none}@media(max-width:520px){body{padding:18px 12px}.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header>
    <h1>福宠 · 猫狗真实声音试听清单</h1>
    <p>幼猫 30 条、幼犬 30 条，每条约 4 秒。音频默认不预载，点击后才读取；也可以逐条复制或下载。</p>
  </header>
  <nav class="tabs"><button class="on" data-kind="cat">幼猫 30 条</button><button data-kind="dog">幼犬 30 条</button></nav>
  <main class="grid" id="list"></main>
  <script>
    const list=document.querySelector('#list');
    function render(kind){
      const folder=kind==='cat'?'cats':'dogs',label=kind==='cat'?'真实幼猫声音':'真实幼犬声音';
      list.innerHTML=Array.from({length:30},(_,i)=>{const n=String(i+1).padStart(2,'0'),src=`./${folder}/${kind}-${n}.mp3`;return `<article class="item"><b>${label} ${n}</b><small>4 秒 · MP3 · 点击后加载</small><audio controls preload="none" src="${src}"></audio><a href="${src}" download>下载 / 复制此音频</a></article>`}).join('');
    }
    document.querySelectorAll('.tabs button').forEach(button=>button.addEventListener('click',()=>{document.querySelector('.tabs .on').classList.remove('on');button.classList.add('on');render(button.dataset.kind)}));
    render('cat');
  </script>
</body>
</html>
